<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
        }
        
        body { 
            background-color: #f0f4f8; 
            min-height: 100vh;
        }

        /* Custom Scrollbar for Messages Area */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Floating Chat Button */
        #chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        #chat-trigger:hover { 
            transform: scale(1.1) translateY(-5px); 
            animation: none;
        }

        /* Pulse Animation for Chat Button */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Chat Window Container */
        #chat-window {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 600px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            display: none; 
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transform-origin: bottom right;
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Header Styling */
        #chat-header {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        #chat-header h3 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.5px;}
        #chat-header p { margin: 4px 0 0; font-size: 12px; color: #e2e8f0; font-weight: 400;}
        
        #close-btn { 
            cursor: pointer; 
            font-size: 22px; 
            color: #e2e8f0; 
            transition: color 0.2s; 
            padding: 5px;
        }
        #close-btn:hover { color: white; }

        /* Messages Area */
        #messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Message Bubbles */
        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            max-width: 80%;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot { 
            background: #ffffff; 
            color: #334155; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
            border: 1px solid #e2e8f0;
        }
        
        .user { 
            background: linear-gradient(135deg, #4f46e5, #3b82f6); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
        }

        /* Typing Animation Dots */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 5px 10px;
            align-items: center;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Input Area */
        #input-area {
            padding: 16px 20px;
            background: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }
        
        .input-wrapper {
            flex: 1;
            background: #f1f5f9;
            border-radius: 24px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            color: #334155;
        }
        
        #user-input::placeholder { color: #94a3b8; }

        #send-btn {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }
        
        #send-btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }
        
        #send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- Floating Button -->
    <div id="chat-trigger" onclick="toggleChat()">
        <i class="fa-solid fa-robot"></i>
    </div>

    <!-- Chat Window -->
    <div id="chat-window">
        <!-- Header -->
        <div id="chat-header">
            <div class="header-info">
                <div class="header-avatar">
                    <i class="fa-solid fa-headset"></i>
                </div>
                <div>
                    <h3>DevOps Assistant</h3>
                    <p>🟢 Online | Knowledge Base</p>
                </div>
            </div>
            <div id="close-btn" onclick="toggleChat()">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages">
            <div class="msg bot">Hello! I am your Enterprise AI Assistant. How can I help you with your DevOps inquiries today?</div>
        </div>

        <!-- Input Area -->
        <div id="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKey(event)">
            </div>
            <button id="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Toggle Chat Visibility
        function toggleChat() {
            const chatWin = document.getElementById('chat-window');
            if (chatWin.style.display === 'flex') {
                chatWin.style.display = 'none';
            } else {
                chatWin.style.display = 'flex';
                document.getElementById('user-input').focus();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('messages');
            const text = input.value.trim();

            if (!text) return;

            // Display user message
            messages.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            scrollToBottom();

            // Show Animated 'Typing...' placeholder
            const typingId = "typing-" + Date.now();
            const typingHtml = `
                <div class="msg bot" id="${typingId}">
                    <div class="typing-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>`;
            messages.innerHTML += typingHtml;
            scrollToBottom();

            try {
                // Aapka API endpoint yahan hai
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // Replace typing animation with actual reply
                const typingElement = document.getElementById(typingId);
                if(typingElement) {
                    typingElement.innerHTML = data.reply;
                }
                scrollToBottom();
                
            } catch (error) {
                const typingElement = document.getElementById(typingId);
                if(typingElement) {
                    typingElement.innerHTML = "<span style='color: #ef4444;'><i class='fa-solid fa-circle-exclamation'></i> Error: System offline or unable to connect.</span>";
                }
                scrollToBottom();
            }
        }

        function handleKey(e) { 
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage(); 
            }
        }

        function scrollToBottom() {
            const messages = document.getElementById('messages');
            messages.scrollTo({
                top: messages.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
